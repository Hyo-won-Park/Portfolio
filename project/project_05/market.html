  <script>
    $(function(){
      $(window).scroll(function(){
        var num = $(this).scrollTop();
        if( num > 1 ){
          $("#header").addClass('on');
        }else{
          $("#header").removeClass('on');
        }
      });
    });

    $(function(){
      $('#open').click(function() {
        $('.nav, .lang_nav, .mobile_back_btn').addClass('on');
      });
      $('#back, #header .nav ul li').click(function() {
        $('.nav, .lang_nav, .mobile_back_btn').removeClass('on');
      });
    });
  </script>

<script>
  var swiper = new Swiper(".mySwiper", {
    pagination: {

  });

  var swiper = new Swiper(".analy", {

  $(document).ready(function() {
   $(window).scroll( function(){
     $('.up-on-scroll').each( function(i){
        var bottom_of_element = $(this).offset().top;
        var bottom_of_window = $(window).scrollTop() + $(window).height();

        if( bottom_of_window > bottom_of_element ){
           $(this).addClass('on')
        } else {
          $(this).removeClass('on')
        }
     });
   });
 });

  $(function(){
$(window).scroll(function(){

});
});

  $(function() {

   var $w = $(window),
     footerHei = $('footer').outerHeight(),
     $banner = $('#float_btn');

   $w.on('scroll', function() {

     var sT = $w.scrollTop();
     var val = $(document).height() - $w.height() - footerHei;

     if (sT >= val)

     else
